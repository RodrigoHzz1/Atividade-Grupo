# Nome da Aplicação
spring.application.name=Atividade-em-grupo

# Configuração de Conexão com o Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3000/atlantic_offshore?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configurações do Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Definição da porta do servidor Backend
server.port=8080